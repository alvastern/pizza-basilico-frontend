<section>
    <h2>Beställ takeaway</h2>

    <article>
        <h3>Dina produkter</h3>

        <div *ngFor="let pizza of cart">
            <p>{{ pizza.quantity }}x {{ pizza.title }}</p>
        </div>

        <p>Totalt: {{ getTotal() }} kr</p>

        <button routerLink="/takeaway">Ändra beställning</button>
    </article>

    <article>
        <h3>Betalningsalternativ</h3>

        <button>Swisch</button>
        <button>Apple Pay</button>
        <button>Kortbetalaning</button>

        <button routerLink="/takeaway/tack">Betala</button>
    </article>
</section>
