<section>
    <h2>Välkommen till Pizza Basilico</h2>
    <p>{{ homeText }}</p>

    <article>
        <button routerLink="/boka-bord">Boka bord</button>
        <button routerLink="/takeaway">Takeaway</button>
    </article>
</section>

<section>
    <h2>Vår meny</h2>
    <article>
        <div *ngFor="let pizza of pizzas">
            <article>
                <h2>{{ pizza.title }}</h2>
                <p>{{ pizza.description }}</p>
                <span>{{ pizza.price }} kr</span>
            </article>

            <img [src]="'/images/meny/' + pizza.image">
        </div>
    </article>
</section>

<section>
    <h2>Om oss</h2>
    <p>{{ aboutText }}</p>

    <article>
        <h3>Öppentider</h3>

        <div *ngFor="let day of openingHours">
            <p *ngIf="!day.is_closed">
                {{ day.weekday }}:
                {{ day.open_time }} - {{ day.close_time }}
            </p>

            <p *ngIf="day.is_closed">
                {{ day.weekday }}: Stängt
            </p>
        </div>
    </article>
</section>
