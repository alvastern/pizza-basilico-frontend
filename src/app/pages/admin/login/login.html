<section id="login-wrapper">
    <app-header-admin></app-header-admin>

    <article id="login-card">
        <h1>Logga in</h1>

        <form (ngSubmit)="loginUser()">
            <div class="input-group">
                <input type="email" placeholder="E-postadress" [(ngModel)]="email" name="email">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Lösenord" [(ngModel)]="password" name="password">
            </div>

            <p *ngIf="errorMessage">{{ errorMessage }}</p>

            <button type="submit">Logga in</button>
        </form>

        <p id="register-text">Jobbar du på Pizza Basilico och inte har något 
            arbetskonto?<a routerLink="/admin/register">Registrera ett här.</a></p>
    </article>
</section>
